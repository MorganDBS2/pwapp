<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WorkLift">
<meta name="theme-color" content="#0a0a0f">
<title>WorkLift</title>
<style>
:root {
  --bg0: #0a0a0f;
  --bg1: #111118;
  --bg2: #1a1a24;
  --bg3: #22222f;
  --bg4: #2c2c3d;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text1: #f0f0fa;
  --text2: #9494b0;
  --text3: #5a5a72;
  --gold: #c9a84c;
  --gold2: #f5d47a;
  --purple: #7b6cf6;
  --purple2: #a89cf8;
  --red: #e05252;
  --green: #4ecb71;
  --blue: #4e9de0;
  --orange: #e07c4e;
  --pink: #e04e9d;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg0);color:var(--text1);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif;overflow:hidden;user-select:none;}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;overflow:hidden;}
/* NAV */
#nav{display:flex;background:rgba(10,10,15,0.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:0.5px solid var(--border);padding:8px 0 calc(8px + var(--safe-bot));position:relative;z-index:100;flex-shrink:0;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;cursor:pointer;transition:all .2s;position:relative;}
.nav-icon{font-size:22px;line-height:1;transition:all .2s;}
.nav-label{font-size:10px;font-weight:500;color:var(--text3);transition:all .2s;letter-spacing:.3px;}
.nav-item.active .nav-icon{transform:scale(1.1);}
.nav-item.active .nav-label{color:var(--gold);}
.nav-dot{width:4px;height:4px;border-radius:50%;background:var(--gold);position:absolute;bottom:2px;opacity:0;transition:all .2s;}
.nav-item.active .nav-dot{opacity:1;}
/* PAGES */
#pages{flex:1;overflow:hidden;position:relative;}
.page{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:8px;opacity:0;pointer-events:none;transform:translateY(12px);transition:opacity .28s ease,transform .28s ease;}
.page.active{opacity:1;pointer-events:all;transform:translateY(0);}
.page-inner{padding:calc(var(--safe-top) + 16px) 16px 20px;}
/* HEADER */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.page-title{font-size:28px;font-weight:700;letter-spacing:-.5px;}
.page-subtitle{font-size:13px;color:var(--text2);margin-top:2px;}
.header-btn{width:38px;height:38px;border-radius:50%;background:var(--bg2);border:0.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .18s;}
.header-btn:active{transform:scale(0.92);}
/* CARDS */
.card{background:var(--bg1);border:0.5px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;}
.card-sm{background:var(--bg2);border:0.5px solid var(--border);border-radius:14px;padding:14px;}
.card-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.card-value{font-size:22px;font-weight:700;}
.card-sub{font-size:12px;color:var(--text2);margin-top:3px;}
/* GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
/* RANK BADGE */
.rank-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:100px;font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;}
/* SECTION TITLE */
.section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:12px;margin-top:4px;}
/* BUTTON */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:14px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;letter-spacing:-.1px;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:linear-gradient(135deg,#7b6cf6,#5a4de0);color:#fff;}
.btn-gold{background:linear-gradient(135deg,#c9a84c,#f5d47a);color:#1a1200;}
.btn-ghost{background:var(--bg2);color:var(--text1);border:0.5px solid var(--border2);}
.btn-danger{background:rgba(224,82,82,0.15);color:var(--red);border:0.5px solid rgba(224,82,82,0.3);}
.btn-sm{padding:9px 16px;font-size:13px;border-radius:10px;}
.btn-block{width:100%;}
/* INPUT */
.input-group{margin-bottom:14px;}
.input-label{font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;letter-spacing:.3px;}
.input{width:100%;background:var(--bg2);border:0.5px solid var(--border2);border-radius:12px;padding:13px 15px;color:var(--text1);font-size:15px;outline:none;transition:border-color .18s;-webkit-appearance:none;}
.input:focus{border-color:var(--purple);}
.input::placeholder{color:var(--text3);}
textarea.input{resize:none;min-height:80px;}
select.input{cursor:pointer;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:500;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg1);border-radius:24px 24px 0 0;width:100%;max-width:430px;max-height:90vh;overflow-y:auto;padding:0 0 calc(20px + var(--safe-bot));transform:translateY(100%);transition:transform .32s cubic-bezier(.32,0,.15,1);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--bg4);border-radius:2px;margin:12px auto 0;}
.modal-header{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:19px;font-weight:700;}
.modal-body{padding:16px 20px 0;}
.modal-close{width:32px;height:32px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text2);}
/* TAGS */
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.tag{padding:5px 11px;border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);transition:all .15s;}
.tag.active{background:rgba(123,108,246,0.2);border-color:var(--purple);color:var(--purple2);}
/* EXERCISE ROW */
.ex-row{display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:0.5px solid var(--border);}
.ex-row:last-child{border-bottom:none;}
.ex-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ex-meta{font-size:12px;color:var(--text2);margin-top:2px;}
.ex-action{flex-shrink:0;}
/* SETS TABLE */
.sets-table{width:100%;}
.sets-table th{font-size:11px;color:var(--text3);font-weight:600;text-align:center;padding:4px 6px;text-transform:uppercase;letter-spacing:.5px;}
.sets-table th:first-child{text-align:left;}
.sets-table td{text-align:center;padding:7px 6px;}
.sets-table td:first-child{text-align:left;font-size:13px;color:var(--text2);}
.sets-input{width:56px;background:var(--bg2);border:0.5px solid var(--border2);border-radius:8px;padding:7px 6px;color:var(--text1);font-size:14px;font-weight:600;text-align:center;outline:none;}
.sets-input:focus{border-color:var(--purple);}
/* HISTORY ITEM */
.hist-item{background:var(--bg1);border:0.5px solid var(--border);border-radius:16px;padding:15px;margin-bottom:10px;cursor:pointer;transition:all .18s;}
.hist-item:active{transform:scale(0.98);}
.hist-date{font-size:12px;color:var(--text3);margin-bottom:4px;}
.hist-name{font-size:16px;font-weight:700;}
.hist-stats{display:flex;gap:16px;margin-top:8px;}
.hist-stat{font-size:12px;color:var(--text2);}
.hist-stat span{color:var(--text1);font-weight:600;}
/* CHALLENGE */
.challenge-card{background:var(--bg1);border:0.5px solid var(--border);border-radius:16px;padding:15px;margin-bottom:10px;}
.challenge-name{font-size:15px;font-weight:700;margin-bottom:4px;}
.challenge-desc{font-size:12px;color:var(--text2);margin-bottom:12px;}
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:5px;}
/* PR */
.pr-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid var(--border);}
.pr-row:last-child{border-bottom:none;}
.pr-name{font-size:14px;font-weight:600;}
.pr-reps{display:flex;gap:8px;}
.pr-chip{font-size:12px;font-weight:700;color:var(--gold2);background:rgba(201,168,76,0.12);padding:4px 9px;border-radius:8px;}
/* GRAPH */
canvas.chart{width:100%;height:160px;display:block;}
/* TOAST */
#toast{position:fixed;top:calc(var(--safe-top) + 16px);left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bg2);border:0.5px solid var(--border2);border-radius:14px;padding:12px 20px;font-size:14px;font-weight:600;z-index:999;transition:transform .28s cubic-bezier(.32,0,.15,1);white-space:nowrap;backdrop-filter:blur(20px);}
#toast.show{transform:translateX(-50%) translateY(0);}
/* SESSION ACTIVE */
#active-session-bar{position:fixed;bottom:calc(60px + var(--safe-bot) + 8px);left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7b6cf6,#5a4de0);border-radius:16px;padding:12px 20px;display:flex;align-items:center;gap:12px;z-index:200;box-shadow:0 8px 32px rgba(123,108,246,0.4);cursor:pointer;transition:all .2s;opacity:0;pointer-events:none;max-width:calc(430px - 32px);width:calc(100% - 32px);}
#active-session-bar.visible{opacity:1;pointer-events:all;}
#active-session-bar:active{transform:translateX(-50%) scale(0.97);}
.asb-text{flex:1;}
.asb-title{font-size:14px;font-weight:700;}
.asb-timer{font-size:12px;opacity:.8;margin-top:1px;}
/* RANK DISPLAY */
.rank-display{background:linear-gradient(135deg,var(--bg1),var(--bg2));border:0.5px solid var(--border2);border-radius:20px;padding:20px;text-align:center;margin-bottom:16px;}
.rank-icon{font-size:48px;margin-bottom:8px;}
.rank-name{font-size:22px;font-weight:800;letter-spacing:-.3px;}
.rank-xp{font-size:13px;color:var(--text2);margin-top:4px;}
.rank-progress{height:8px;background:var(--bg3);border-radius:4px;margin-top:14px;overflow:hidden;}
.rank-progress-fill{height:100%;border-radius:4px;transition:width .6s ease;}
/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-up{animation:fadeUp .3s ease both;}
.anim-delay-1{animation-delay:.05s}
.anim-delay-2{animation-delay:.1s}
.anim-delay-3{animation-delay:.15s}
.anim-delay-4{animation-delay:.2s}
/* PINNED BADGE */
.pinned-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;color:var(--gold);background:rgba(201,168,76,0.12);padding:3px 9px;border-radius:100px;}
/* MUSCLE CHIP */
.muscle-chip{font-size:11px;font-weight:600;padding:3px 9px;border-radius:100px;background:rgba(123,108,246,0.15);color:var(--purple2);border:0.5px solid rgba(123,108,246,0.25);}
/* EMPTY STATE */
.empty-state{text-align:center;padding:40px 20px;}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4;}
.empty-title{font-size:17px;font-weight:700;margin-bottom:6px;}
.empty-sub{font-size:14px;color:var(--text2);}
/* SESSION RUN */
#session-run{position:fixed;inset:0;background:var(--bg0);z-index:300;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .36s cubic-bezier(.32,0,.15,1);}
#session-run.open{transform:translateY(0);}
.sr-header{padding:calc(var(--safe-top) + 16px) 16px 12px;display:flex;align-items:center;gap:12px;border-bottom:0.5px solid var(--border);flex-shrink:0;}
.sr-title{flex:1;font-size:18px;font-weight:700;}
.sr-timer{font-size:14px;font-weight:700;color:var(--purple2);font-variant-numeric:tabular-nums;}
.sr-body{flex:1;overflow-y:auto;padding:16px;}
.sr-ex-card{background:var(--bg1);border:0.5px solid var(--border);border-radius:16px;padding:15px;margin-bottom:12px;}
.sr-ex-name{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.sr-set-row{display:grid;grid-template-columns:28px 1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px;}
.sr-set-num{font-size:13px;color:var(--text3);font-weight:600;text-align:center;}
.sr-set-inp{background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:9px 10px;color:var(--text1);font-size:15px;font-weight:600;text-align:center;width:100%;outline:none;}
.sr-set-inp:focus{border-color:var(--purple);}
.sr-set-done{width:32px;height:32px;border-radius:8px;background:var(--bg3);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:all .15s;}
.sr-set-done.checked{background:rgba(78,203,113,0.2);border-color:var(--green);color:var(--green);}
.sr-footer{padding:12px 16px calc(var(--safe-bot) + 12px);border-top:0.5px solid var(--border);flex-shrink:0;}
/* SCROLLBAR */
::-webkit-scrollbar{width:0;}
/* STAT CARD WITH CHART */
.stat-chart-card{background:var(--bg1);border:0.5px solid var(--border);border-radius:18px;padding:16px;margin-bottom:12px;}
.stat-chart-title{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
/* ICON PICKER */
.icon-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:8px;}
.icon-opt{width:100%;aspect-ratio:1;border-radius:12px;background:var(--bg2);border:1.5px solid transparent;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;transition:all .15s;}
.icon-opt.active{border-color:var(--purple);background:rgba(123,108,246,0.15);}
/* SWITCH */
.switch-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:0.5px solid var(--border);}
.switch{width:44px;height:26px;background:var(--bg3);border-radius:13px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.switch.on{background:var(--purple);}
.switch-thumb{width:22px;height:22px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;transition:transform .2s;}
.switch.on .switch-thumb{transform:translateX(18px);}
</style>
</head>
<body>
<div id="app">
  <div id="pages">
    <!-- DASHBOARD -->
    <div class="page active" id="page-dashboard">
      <div class="page-inner" id="dashboard-inner"></div>
    </div>
    <!-- SESSIONS -->
    <div class="page" id="page-sessions">
      <div class="page-inner" id="sessions-inner"></div>
    </div>
    <!-- HISTORY -->
    <div class="page" id="page-history">
      <div class="page-inner" id="history-inner"></div>
    </div>
    <!-- STATS -->
    <div class="page" id="page-stats">
      <div class="page-inner" id="stats-inner"></div>
    </div>
    <!-- PROFILE -->
    <div class="page" id="page-profile">
      <div class="page-inner" id="profile-inner"></div>
    </div>
  </div>
  <nav id="nav">
    <div class="nav-item active" data-page="dashboard">
      <div class="nav-icon">🏠</div>
      <div class="nav-label">Accueil</div>
      <div class="nav-dot"></div>
    </div>
    <div class="nav-item" data-page="sessions">
      <div class="nav-icon">🏋️</div>
      <div class="nav-label">Séances</div>
      <div class="nav-dot"></div>
    </div>
    <div class="nav-item" data-page="history">
      <div class="nav-icon">📅</div>
      <div class="nav-label">Historique</div>
      <div class="nav-dot"></div>
    </div>
    <div class="nav-item" data-page="stats">
      <div class="nav-icon">📊</div>
      <div class="nav-label">Stats</div>
      <div class="nav-dot"></div>
    </div>
    <div class="nav-item" data-page="profile">
      <div class="nav-icon">👤</div>
      <div class="nav-label">Profil</div>
      <div class="nav-dot"></div>
    </div>
  </nav>
</div>

<!-- ACTIVE SESSION BAR -->
<div id="active-session-bar" onclick="openActiveSession()">
  <div>⚡</div>
  <div class="asb-text">
    <div class="asb-title" id="asb-name">Séance en cours</div>
    <div class="asb-timer" id="asb-timer">00:00</div>
  </div>
  <div>▶</div>
</div>

<!-- SESSION RUN -->
<div id="session-run">
  <div class="sr-header">
    <button class="header-btn" onclick="closeSessionRun()">✕</button>
    <div class="sr-title" id="sr-title">Séance</div>
    <div class="sr-timer" id="sr-timer">00:00</div>
    <button class="btn btn-gold btn-sm" onclick="finishSession()">Terminer</button>
  </div>
  <div class="sr-body" id="sr-body"></div>
  <div class="sr-footer">
    <button class="btn btn-ghost btn-block" onclick="addExToSession()">+ Ajouter un exercice</button>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-session-edit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="session-edit-title">Nouvelle séance</div>
      <div class="modal-close" onclick="closeModal('modal-session-edit')">✕</div>
    </div>
    <div class="modal-body" id="session-edit-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-exercise-edit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="exercise-edit-title">Nouvel exercice</div>
      <div class="modal-close" onclick="closeModal('modal-exercise-edit')">✕</div>
    </div>
    <div class="modal-body" id="exercise-edit-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-history-detail">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Détail</div>
      <div class="modal-close" onclick="closeModal('modal-history-detail')">✕</div>
    </div>
    <div class="modal-body" id="history-detail-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-challenge-edit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="challenge-edit-title">Nouveau défi</div>
      <div class="modal-close" onclick="closeModal('modal-challenge-edit')">✕</div>
    </div>
    <div class="modal-body" id="challenge-edit-body"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-pick-exercise">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title">Choisir un exercice</div>
      <div class="modal-close" onclick="closeModal('modal-pick-exercise')">✕</div>
    </div>
    <div class="modal-body" id="pick-exercise-body"></div>
  </div>
</div>

<script>
// ============================================================
//  DATA LAYER
// ============================================================
const DB = {
  get(k){try{return JSON.parse(localStorage.getItem('wl_'+k))}catch{return null}},
  set(k,v){localStorage.setItem('wl_'+k,JSON.stringify(v));return v},
  save(k,fn){const d=this.get(k)||fn();this.set(k,d);return d}
};

// DEFAULT DATA
const DEFAULT_EXERCISES = [
  {id:'ex_bench',name:'Développé couché',icon:'🏋️',muscles:['Pectoraux','Triceps','Épaules'],custom:false},
  {id:'ex_squat',name:'Squat',icon:'🦵',muscles:['Quadriceps','Fessiers','Ischio'],custom:false},
  {id:'ex_deadlift',name:'Soulevé de terre',icon:'💪',muscles:['Dos','Fessiers','Ischio'],custom:false},
  {id:'ex_ohp',name:'Développé militaire',icon:'🔝',muscles:['Épaules','Triceps'],custom:false},
  {id:'ex_row',name:'Rowing barre',icon:'🚣',muscles:['Dos','Biceps'],custom:false},

const RANKS = [
  {name:'Iron',icon:'⚙️',color:'#888',min:0,max:500},
  {name:'Bronze',icon:'🥉',color:'#cd7f32',min:500,max:1500},
  {name:'Silver',icon:'🥈',color:'#c0c0c0',min:1500,max:3500},
  {name:'Gold',icon:'🥇',color:'#ffd700',min:3500,max:7000},
  {name:'Platinum',icon:'💎',color:'#e5e4e2',min:7000,max:12000},
  {name:'Diamond',icon:'💠',color:'#b9f2ff',min:12000,max:20000},
  {name:'Master',icon:'🔮',color:'#9b59b6',min:20000,max:35000},
  {name:'Elite',icon:'⚡',color:'#e74c3c',min:35000,max:55000},
  {name:'Titan',icon:'🔱',color:'#f39c12',min:55000,max:80000},
  {name:'Legend',icon:'👑',color:'#f5d47a',min:80000,max:Infinity},
];

function calcXP(){
  const prs=DB.get('prs')||{};
  const hist=DB.get('history')||[];
  let xp=0;
  xp+=hist.length*100;
  Object.values(prs).forEach(exPrs=>{
    [1,3,5,8,10].forEach(r=>{
      if(exPrs[r]) xp+=exPrs[r]*2;
    });
  });
  return Math.floor(xp);
}

function getRank(xp){
  for(let i=RANKS.length-1;i>=0;i--){
    if(xp>=RANKS[i].min) return RANKS[i];
  }
  return RANKS[0];
}

function getRankProgress(xp){
  const r=getRank(xp);
  if(r.max===Infinity) return 100;
  return Math.min(100,Math.round(((xp-r.min)/(r.max-r.min))*100));
}

// ============================================================
//  PR ENGINE
// ============================================================
function updatePRs(exerciseId,sets){
  const prs=DB.get('prs')||{};
  if(!prs[exerciseId]) prs[exerciseId]={};
  const repGroups=[1,3,5,8,10];
  let newPR=false;
  sets.forEach(s=>{
    if(!s.done||!s.weight) return;
    repGroups.forEach(target=>{
      if(s.reps>=target){
        const cur=prs[exerciseId][target]||0;
        if(s.weight>cur){prs[exerciseId][target]=s.weight;newPR=true;}
      }
    });
  });
  DB.set('prs',prs);
  return newPR;
}

// ============================================================
//  CHALLENGE ENGINE
// ============================================================
function updateChallenges(triggerData){
  const chs=DB.get('challenges')||[];
  const hist=DB.get('history')||[];
  const prs=DB.get('prs')||{};
  let changed=false;
  chs.forEach(ch=>{
    if(ch.completed) return;
    let prog=0;
    if(ch.type==='sessions_total') prog=hist.length;
    else if(ch.type==='pr_weight'){
      const ep=prs[ch.exerciseId]||{};
      prog=ep[ch.repTarget]||0;
    }
    else if(ch.type==='session_volume') prog=triggerData&&triggerData.volume?Math.max(ch.progress,triggerData.volume):ch.progress;
    else if(ch.type==='sessions_period'){
      const start=new Date(ch.startDate);
      const cutoff=new Date(start.getTime()+ch.periodDays*86400000);
      prog=hist.filter(h=>new Date(h.date)>=start&&new Date(h.date)<=cutoff).length;
    }
    ch.progress=prog;
    if(prog>=ch.target&&!ch.completed){
      ch.completed=true;ch.completedDate=new Date().toISOString();changed=true;
      setTimeout(()=>toast('🏆 Défi accompli : '+ch.name),300);
    }
  });
  DB.set('challenges',chs);
}

function uid(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);}
function fmtDate(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
}
function fmtTime(sec){
  const m=Math.floor(sec/60),s=sec%60;
  return (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
}
function sessionVolume(exercises){
  let v=0;
  exercises.forEach(ex=>{
    ex.sets.forEach(s=>{
      const done=s.done!==undefined?s.done:true;
      if(done) v+=(s.weight||0)*(s.reps||0);
    });
  });
  return v;
}
function toast(msg,dur=2800){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

let activeSession=null;
let sessionTimer=null;
let sessionSeconds=0;

function startSession(id){
  const sessions=DB.get('sessions')||[];
  const s=sessions.find(x=>x.id===id);
  if(!s) return;
  activeSession={
    id:uid(),
    sessionId:s.id,
    sessionName:s.name,
    date:new Date().toISOString(),
    duration:0,
    exercises:JSON.parse(JSON.stringify(s.exercises||[])).map(ex=>({
      ...ex,
      sets:ex.sets.map(st=>({...st,done:false}))
    }))
  };
  sessionSeconds=0;
  openSessionRun();
}

function openSessionRun(){
  if(!activeSession) return;
  document.getElementById('sr-title').textContent=activeSession.sessionName;
  renderSessionRun();
  document.getElementById('session-run').classList.add('open');
  document.getElementById('active-session-bar').classList.add('visible');
  document.getElementById('asb-name').textContent=activeSession.sessionName;
  clearInterval(sessionTimer);
  sessionTimer=setInterval(()=>{
    sessionSeconds++;
    const t=fmtTime(sessionSeconds);
    document.getElementById('sr-timer').textContent=t;
    document.getElementById('asb-timer').textContent=t;
  },1000);
}

function openActiveSession(){openSessionRun();}

function closeSessionRun(){
  document.getElementById('session-run').classList.remove('open');
}

function renderSessionRun(){
  let html='';
  (activeSession.exercises||[]).forEach((ex,i)=>{
    const exDef=getExercise(ex.exerciseId);
    html+=`<div class="sr-ex-card">
      <div class="sr-ex-name">${exDef.icon} ${exDef.name}</div>
      <div style="display:grid;grid-template-columns:28px 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid var(--border)">
        <div style="font-size:11px;color:var(--text3);text-align:center">N°</div>
        <div style="font-size:11px;color:var(--text3);text-align:center">Reps</div>
        <div style="font-size:11px;color:var(--text3);text-align:center">Kg</div>
        <div style="font-size:11px;color:var(--text3);text-align:center">✓</div>
      </div>`;
    ex.sets.forEach((s,j)=>{
      html+=`<div class="sr-set-row">
        <div class="sr-set-num">${j+1}</div>
        <input class="sr-set-inp" type="number" min="0" value="${s.reps||''}" placeholder="—" onchange="updateActiveSet(${i},${j},'reps',this.value)">
        <input class="sr-set-inp" type="number" min="0" step="0.5" value="${s.weight||''}" placeholder="—" onchange="updateActiveSet(${i},${j},'weight',this.value)">
        <div class="sr-set-done${s.done?' checked':''}" onclick="toggleSetDone(${i},${j})">${s.done?'✓':'○'}</div>
      </div>`;
    });
    html+=`<div style="margin-top:8px;display:flex;gap:8px">
      <button class="btn btn-ghost btn-sm" onclick="addSetToActive(${i})">+ Série</button>
      <button class="btn btn-danger btn-sm" onclick="removeExFromActive(${i})">Retirer</button>
    </div></div>`;
  });
  document.getElementById('sr-body').innerHTML=html;
}

function updateActiveSet(exIdx,setIdx,field,val){
  activeSession.exercises[exIdx].sets[setIdx][field]=parseFloat(val)||0;
}

function toggleSetDone(exIdx,setIdx){
  const s=activeSession.exercises[exIdx].sets[setIdx];
  s.done=!s.done;
  const el=document.querySelectorAll('.sr-set-done')[exIdx*99+setIdx];
  renderSessionRun();
}

function addSetToActive(exIdx){
  const sets=activeSession.exercises[exIdx].sets;
  const last=sets[sets.length-1]||{reps:10,weight:0,done:false};
  sets.push({reps:last.reps,weight:last.weight,done:false});
  renderSessionRun();
}

function removeExFromActive(exIdx){
  activeSession.exercises.splice(exIdx,1);
  renderSessionRun();
}

function addExToSession(){
  pickCallback=(exId)=>{
    activeSession.exercises.push({exerciseId:exId,sets:[{reps:10,weight:0,done:false},{reps:10,weight:0,done:false},{reps:10,weight:0,done:false}]});
    renderSessionRun();
    closeModal('modal-pick-exercise');
  };
  openPickExercise();
}

function addExerciseToActiveSession(exId){
  activeSession.exercises.push({exerciseId:exId,sets:[{reps:10,weight:0,done:false},{reps:10,weight:0,done:false},{reps:10,weight:0,done:false}]});
  renderSessionRun();
}

function finishSession(){
  clearInterval(sessionTimer);
  activeSession.duration=sessionSeconds;
  // calc done sets only
  activeSession.exercises.forEach(ex=>{
    ex.sets=ex.sets.filter(s=>s.done);
  });
  activeSession.exercises=activeSession.exercises.filter(ex=>ex.sets.length>0);
  if(!activeSession.exercises.length){
    toast('⚠️ Aucune série validée');
    return;
  }

  // Save history
  const hist=DB.get('history')||[];
  hist.push(activeSession);
  DB.set('history',hist);

  // Update PRs
  let anyPR=false;
  activeSession.exercises.forEach(ex=>{
    if(updatePRs(ex.exerciseId,ex.sets)) anyPR=true;
  });

  // Update challenges
  const vol=sessionVolume(activeSession.exercises);
  updateChallenges({volume:vol});

  // Close
  document.getElementById('session-run').classList.remove('open');
  document.getElementById('active-session-bar').classList.remove('visible');
  activeSession=null;
  sessionSeconds=0;

  if(anyPR) setTimeout(()=>toast('🏆 Nouveau record personnel !'),500);
  else toast('✅ Séance terminée ! '+vol.toLocaleString('fr')+' kg soulevés');

  render(currentPage);
}

    allExWithPR.forEach(ex=>{
      const ep=prs[ex.id]||{};
      html+=`<tr style="border-bottom:0.5px solid var(--border)"><td style="padding:8px 4px;font-weight:600">${ex.icon} ${ex.name.split(' ').slice(0,2).join(' ')}</td>`;
      [1,3,5,8,10].forEach(r=>{
        html+=`<td style="text-align:center;padding:8px 2px;${ep[r]?'color:var(--gold2);font-weight:700':'color:var(--text3)'}">
          ${ep[r]?ep[r]+'':'-'}</td>`;
      });

}

function getExerciseHistory(exId,hist){
  const points=[];
  hist.forEach(h=>{
    h.exercises.forEach(ex=>{
      if(ex.exerciseId===exId){
        let max=0;
        ex.sets.forEach(s=>{if((s.weight||0)>max)max=s.weight;});
        if(max>0) points.push({date:h.date,weight:max});
      }
    });
  });
  return points;
}

function drawChart(canvasId,data){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const dpr=window.devicePixelRatio||1;
  const rect=canvas.getBoundingClientRect();
  canvas.width=rect.width*dpr;
  canvas.height=rect.height*dpr;
  const ctx=canvas.getContext('2d');
  ctx.scale(dpr,dpr);
  const W=rect.width,H=rect.height;
  const pad={t:10,r:10,b:24,l:36};
  const pts=data.slice(-20);
  if(pts.length<1) return;
  const vals=pts.map(p=>p.weight);
  const minV=Math.min(...vals)*0.95,maxV=Math.max(...vals)*1.05;
  const range=maxV-minV||1;
  const toX=(i)=>pad.l+(i/(Math.max(pts.length-1,1)))*(W-pad.l-pad.r);
  const toY=(v)=>pad.t+(1-(v-minV)/range)*(H-pad.t-pad.b);

  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=0.5;
  [0,0.5,1].forEach(f=>{
    const y=pad.t+f*(H-pad.t-pad.b);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();
    const v=Math.round(maxV-f*range);
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='10px -apple-system,sans-serif';
    ctx.textAlign='right';ctx.fillText(v,pad.l-4,y+4);
  });

  // Area
  const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);
  grad.addColorStop(0,'rgba(123,108,246,0.3)');
  grad.addColorStop(1,'rgba(123,108,246,0)');
  ctx.beginPath();
  pts.forEach((p,i)=>{
    const x=toX(i),y=toY(p.weight);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(toX(pts.length-1),H-pad.b);
  ctx.lineTo(toX(0),H-pad.b);
  ctx.closePath();ctx.fillStyle=grad;ctx.fill();

  // Line
  ctx.beginPath();ctx.strokeStyle='#7b6cf6';ctx.lineWidth=2;ctx.lineJoin='round';ctx.lineCap='round';
  pts.forEach((p,i)=>{
    const x=toX(i),y=toY(p.weight);
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();

  // Dots
  pts.forEach((p,i)=>{
    const x=toX(i),y=toY(p.weight);
    ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle='#a89cf8';ctx.fill();
  });

  // Last value label
  const lx=toX(pts.length-1),ly=toY(pts[pts.length-1].weight);
  ctx.fillStyle='#f5d47a';ctx.font='bold 11px -apple-system,sans-serif';ctx.textAlign='center';
  ctx.fillText(pts[pts.length-1].weight+'kg',lx,Math.max(ly-8,12));

  // X labels (first, middle, last)
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='10px -apple-system,sans-serif';ctx.textAlign='center';
  const idxs=[0,Math.floor(pts.length/2),pts.length-1];
  idxs.forEach(i=>{
    const d=new Date(pts[i].date);
    const label=d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
    ctx.fillText(label,toX(i),H-4);
  });
}

// ============================================================
//  PROFILE
// ============================================================
function renderProfile(){
  const xp=calcXP();
  const rank=getRank(xp);
  const rankProg=getRankProgress(xp);
  const nextRank=RANKS[Math.min(RANKS.indexOf(rank)+1,RANKS.length-1)];
  const hist=DB.get('history')||[];
  const challenges=DB.get('challenges')||[];
  const activeCh=challenges.filter(c=>!c.completed);
  const doneCh=challenges.filter(c=>c.completed);
  const profile=DB.get('profile')||{name:'Morgan'};

  let html=`<div class="page-header"><div><div class="page-title">Profil</div></div></div>
  <div class="rank-display fade-up">
    <div class="rank-icon">${rank.icon}</div>
    <div class="rank-name" style="color:${rank.color}">${rank.name}</div>
    <div class="rank-xp">${xp.toLocaleString('fr')} XP · ${hist.length} séances</div>
    <div class="rank-progress"><div class="rank-progress-fill" style="width:${rankProg}%;background:${rank.color}"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-top:6px"><span>${rank.name}</span><span>${nextRank!==rank?nextRank.name:'MAX'}</span></div>
  </div>`;

  // All ranks
  html+=`<div class="section-title fade-up">Tous les rangs</div>
  <div class="card fade-up" style="padding:12px">`;
  RANKS.forEach(r=>{
    const current=r.name===rank.name;
    const done=xp>=r.min;
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border);opacity:${done?1:0.4}">
      <div style="font-size:24px;width:32px;text-align:center">${r.icon}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:${current?800:600};color:${current?r.color:'var(--text1)'}">${r.name}</div>
        <div style="font-size:11px;color:var(--text3)">${r.min.toLocaleString('fr')} XP${r.max!==Infinity?' – '+r.max.toLocaleString('fr')+' XP':''}</div>
      </div>
      ${current?`<div style="font-size:12px;font-weight:700;color:${r.color}">Actuel</div>`:done?'<div style="color:var(--green);font-size:16px">✓</div>':''}
    </div>`;
  });
  html+=`</div>`;

  // Challenges
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:4px"><div class="section-title" style="margin:0">🎯 Défis</div><div class="header-btn" onclick="openChallengeEdit(null)">＋</div></div>`;

  activeCh.forEach((ch,i)=>{
    const pct=Math.min(100,Math.round((ch.progress/ch.target)*100));
    html+=`<div class="challenge-card fade-up anim-delay-${i+1}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between">
        <div><div class="challenge-name">${ch.name}</div><div class="challenge-desc">${ch.description}</div></div>
        ${!ch.preset?`<div class="header-btn" onclick="deleteCh('${ch.id}')" style="font-size:14px;flex-shrink:0">🗑</div>`:''}
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:linear-gradient(90deg,var(--purple),var(--purple2))"></div></div>
      <div class="progress-label"><span>${ch.progress.toLocaleString('fr')} / ${ch.target.toLocaleString('fr')}</span><span>${pct}%</span></div>
    </div>`;
  });

  if(doneCh.length){
    html+=`<div class="section-title" style="margin-top:8px">✅ Défis accomplis</div>`;
    doneCh.forEach(ch=>{
      html+=`<div class="challenge-card" style="opacity:0.6">
        <div style="display:flex;align-items:center;gap:10px">
          <div style="font-size:20px">🏆</div>
          <div><div class="challenge-name">${ch.name}</div><div class="challenge-desc">Complété le ${fmtDate(ch.completedDate)}</div></div>
        </div>
      </div>`;
    });
  }

  // Backup
  html+=`<div class="section-title" style="margin-top:12px">💾 Sauvegarde</div>
  <div class="card">
    <button class="btn btn-ghost btn-block" style="margin-bottom:10px" onclick="exportData()">📤 Exporter JSON</button>
    <button class="btn btn-ghost btn-block" onclick="importData()">📥 Importer JSON</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="handleImport(this)">
  </div><div style="height:30px"></div>`;

  document.getElementById('profile-inner').innerHTML=html;
}

// CHALLENGES EDIT
function openChallengeEdit(id){
  const challenges=DB.get('challenges')||[];
  const exercises=DB.get('exercises')||[];
  let ch=id?challenges.find(c=>c.id===id):null;
  document.getElementById('challenge-edit-title').textContent=id?'Modifier le défi':'Nouveau défi';
  const exOptions=exercises.map(e=>`<option value="${e.id}">${e.icon} ${e.name}</option>`).join('');
  document.getElementById('challenge-edit-body').innerHTML=`
    <div class="input-group"><div class="input-label">Nom *</div><input class="input" id="ch-name" value="${ch?ch.name:''}" placeholder="ex: Bench 120 kg"></div>
    <div class="input-group"><div class="input-label">Description</div><input class="input" id="ch-desc" value="${ch?ch.description:''}" placeholder="Objectif à atteindre"></div>
    <div class="input-group"><div class="input-label">Type</div>
      <select class="input" id="ch-type" onchange="updateChallengeForm()">
        <option value="sessions_total"${!ch||ch.type==='sessions_total'?' selected':''}>Nombre de séances</option>
        <option value="pr_weight"${ch&&ch.type==='pr_weight'?' selected':''}>Record sur exercice</option>
        <option value="session_volume"${ch&&ch.type==='session_volume'?' selected':''}>Volume par séance</option>
      </select>
    </div>
    <div id="ch-extra"></div>
    <div class="input-group"><div class="input-label">Objectif (valeur cible) *</div><input class="input" type="number" id="ch-target" value="${ch?ch.target:''}" placeholder="ex: 100"></div>
    <button class="btn btn-primary btn-block" onclick="saveChallengeEdit('${id||''}')">Enregistrer</button>
    <div style="height:24px"></div>`;
  updateChallengeForm(ch);
  openModal('modal-challenge-edit');
}

function updateChallengeForm(ch){
  const type=document.getElementById('ch-type').value;
  const exercises=DB.get('exercises')||[];
  let extra='';
  if(type==='pr_weight'){
    const exOptions=exercises.map(e=>`<option value="${e.id}">${e.icon} ${e.name}</option>`).join('');
    extra=`<div class="input-group"><div class="input-label">Exercice</div><select class="input" id="ch-exid">${exOptions}</select></div>
    <div class="input-group"><div class="input-label">Nombre de répétitions</div><select class="input" id="ch-reps"><option value="1">1RM</option><option value="3">3RM</option><option value="5">5RM</option><option value="8">8RM</option><option value="10">10RM</option></select></div>`;
  }
  document.getElementById('ch-extra').innerHTML=extra;
  if(ch&&type==='pr_weight'){
    const sel=document.getElementById('ch-exid');
    if(sel) sel.value=ch.exerciseId||'';
    const rsel=document.getElementById('ch-reps');
    if(rsel) rsel.value=ch.repTarget||1;
  }
}

function saveChallengeEdit(existingId){
  const name=document.getElementById('ch-name').value.trim();
  const desc=document.getElementById('ch-desc').value.trim();
  const type=document.getElementById('ch-type').value;
  const target=parseFloat(document.getElementById('ch-target').value)||0;
  if(!name||!target){toast('⚠️ Nom et objectif requis');return;}
  const ch={
    id:existingId||uid(),name,description:desc,type,target,
    progress:0,completed:false,completedDate:null,preset:false,
    startDate:new Date().toISOString()
  };
  if(type==='pr_weight'){
    ch.exerciseId=document.getElementById('ch-exid').value;
    ch.repTarget=parseInt(document.getElementById('ch-reps').value);
  }
  const challenges=DB.get('challenges')||[];
  const idx=challenges.findIndex(c=>c.id===ch.id);
  if(idx>=0) challenges[idx]=ch; else challenges.push(ch);
  DB.set('challenges',challenges);
  updateChallenges({});
  closeModal('modal-challenge-edit');
  renderProfile();
  toast('✅ Défi enregistré');
}

function deleteCh(id){
  if(!confirm('Supprimer ce défi ?')) return;
  const challenges=DB.get('challenges')||[];
  DB.set('challenges',challenges.filter(c=>c.id!==id));
  renderProfile();
  toast('Défi supprimé');
}

// ============================================================
//  EXPORT / IMPORT
// ============================================================
function exportData(){
  const data={
    exercises:DB.get('exercises'),
    sessions:DB.get('sessions'),
    history:DB.get('history'),
    prs:DB.get('prs'),
    challenges:DB.get('challenges'),
    profile:DB.get('profile'),
    exportDate:new Date().toISOString()
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='worklift-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();URL.revokeObjectURL(url);
  toast('📤 Export réussi');
}

function importData(){
  document.getElementById('import-file').click();
}

function handleImport(input){
  const file=input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.exercises) DB.set('exercises',data.exercises);
      if(data.sessions) DB.set('sessions',data.sessions);
      if(data.history) DB.set('history',data.history);
      if(data.prs) DB.set('prs',data.prs);
      if(data.challenges) DB.set('challenges',data.challenges);
      if(data.profile) DB.set('profile',data.profile);
      toast('✅ Import réussi');
      render(currentPage);
    }catch(err){toast('❌ Fichier invalide');}
  };
  reader.readAsText(file);
  input.value='';
}

// ============================================================
//  SERVICE WORKER (PWA OFFLINE)
// ============================================================
const SW_CODE=`
const CACHE='worklift-v1';
const ASSETS=['/'];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('/'))));
});
`;

function registerSW(){
  if(!('serviceWorker' in navigator)) return;
  const blob=new Blob([SW_CODE],{type:'application/javascript'});
  const url=URL.createObjectURL(blob);
  navigator.serviceWorker.register(url,{scope:'./'}).catch(()=>{});
}

// ============================================================
//  INIT
// ============================================================
initData();
registerSW();
renderDashboard();

// Auto-update challenges on load
setTimeout(()=>updateChallenges({}),500);
</script>
